services:
  app:
    build: .
    container_name: techfala-dashboard
    restart: unless-stopped
    ports:
      - "3847:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-troque-por-uma-chave-secreta-min-32-caracteres}
      - COOKIE_SECURE=false
    volumes:
      - prisma_data:/app/data

volumes:
  prisma_data:
